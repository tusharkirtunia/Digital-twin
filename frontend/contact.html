<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAYURA - Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">VAYURA</a>
        </div>
        <ul class="nav-links">
            <li><a href="#">Activities</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Maps</a></li>
            <li><a href="#">Challenges</a></li>
            <li><a href="#">Subscription</a></li>
        </ul>
        <div class="nav-actions">
            <button class="btn-outline">Log In</button>
        </div>
    </nav>

    <main class="contact-container">
        <div class="showcase-column">
            <img src="assets/fitness_devices.png" class="devices-mockup" alt="Fitness Devices Mockup">
        </div>

        <div class="form-column">
            <div class="contact-card">
                <h2>Contact Us</h2>
                <form id="contactForm">
                    <input type="text" placeholder="Full Name" class="contact-input" required>
                    <input type="email" placeholder="Email Address" class="contact-input" required>
                    <input type="text" placeholder="Subject" class="contact-input" required>
                    <textarea placeholder="Your Message" class="contact-textarea" required></textarea>
                    <button type="submit" class="btn-black">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
